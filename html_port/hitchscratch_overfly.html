<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HitchScratch — Chunk 3D Overfly</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
h1{color:#8bc4e8;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;opacity:0.7}
#wrap{position:relative;border-radius:8px;border:1px solid #334;overflow:hidden;box-shadow:0 0 40px rgba(0,180,255,0.08);width:90vw;max-width:800px;height:70vw;max-height:600px;aspect-ratio:4/3}
canvas{display:block;width:100%;height:100%;min-width:300px;min-height:300px;cursor:grab}
canvas:active{cursor:grabbing}
#ui{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.label{font-size:11px;color:#acd;background:rgba(10,20,40,0.75);border:1px solid rgba(100,160,220,0.2);border-radius:4px;padding:3px 8px;letter-spacing:0.5px}
#controls{position:absolute;bottom:10px;left:10px;display:flex;gap:6px}
button{font-size:11px;letter-spacing:0.5px;padding:5px 12px;border:1px solid rgba(100,160,220,0.35);background:rgba(10,20,40,0.8);color:#8bc4e8;border-radius:4px;cursor:pointer;transition:background 0.15s}
button:hover{background:rgba(40,80,140,0.6)}
</style>
</head>
<body>
<h1>HitchScratch &mdash; Chunk overfly</h1>
<div id="wrap">
<canvas id="c"></canvas>
<div id="ui">
  <span class="label" id="info">Generating terrain…</span>
</div>
<div id="controls">
  <button id="regen">New terrain</button>
  <button id="toggleAnimal">Animal: ON</button>
</div>
</div>
<script type="module">
import { HitchScratchChunk } from './HitchScratchChunk.js';

// Get canvas
const canvas = document.getElementById('c');

// Create chunk renderer
const chunk = new HitchScratchChunk(canvas, {
  onInfoUpdate: (text) => {
    document.getElementById('info').textContent = text;
  }
});

// Start rendering
chunk.start();

// Button event handlers
document.getElementById('regen').addEventListener('click', () => {
  chunk.regen();
});

document.getElementById('toggleAnimal').addEventListener('click', function() {
  const isOn = chunk.toggleAnimal();
  this.textContent = 'Animal: ' + (isOn ? 'ON' : 'OFF');
});

// Window resize handling is now built into the class
</script>
</body>
</html>
