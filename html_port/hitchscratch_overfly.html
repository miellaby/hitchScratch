<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HitchScratch — Chunk 3D Overfly</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
h1{color:#8bc4e8;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;opacity:0.7}
#wrap{position:relative;border-radius:8px;border:1px solid #334;overflow:hidden;box-shadow:0 0 40px rgba(0,180,255,0.08)}
canvas{display:block;width:700px;height:520px;cursor:grab}
canvas:active{cursor:grabbing}
#ui{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.label{font-size:11px;color:#acd;background:rgba(10,20,40,0.75);border:1px solid rgba(100,160,220,0.2);border-radius:4px;padding:3px 8px;letter-spacing:0.5px}
#controls{position:absolute;bottom:10px;left:10px;display:flex;gap:6px}
button{font-size:11px;letter-spacing:0.5px;padding:5px 12px;border:1px solid rgba(100,160,220,0.35);background:rgba(10,20,40,0.8);color:#8bc4e8;border-radius:4px;cursor:pointer;transition:background 0.15s}
button:hover{background:rgba(40,80,140,0.6)}
</style>
</head>
<body>
<h1>HitchScratch &mdash; Chunk overfly</h1>
<div id="wrap">
<canvas id="c"></canvas>
<div id="ui">
  <span class="label" id="info">Generating terrain…</span>
</div>
<div id="controls">
  <button id="regen">New terrain</button>
  <button id="toggleAnimal">Animal: ON</button>
</div>
</div>
<script>
const SIZE = 128;
const PIXEL = 2;

// Diamond-square requires a (2^n + 1) grid.
// We use 65x65 internally, sample 64x64 from it.
function generateNoise(baseVal, spread) {
  const N = 128; // power of two
  const gs = N + 1;
  const g = new Float32Array(gs * gs);
  const rand = s => (Math.random() * 2 - 1) * s;

  g[0]          = baseVal + rand(spread);
  g[N]          = baseVal + rand(spread);
  g[N * gs]     = baseVal + rand(spread);
  g[N * gs + N] = baseVal + rand(spread);

  let step = N, scale = spread * 0.7;
  while (step > 1) {
    const half = step >> 1;

    // diamond: centre of each square
    for (let y = 0; y < N; y += step) {
      for (let x = 0; x < N; x += step) {
        const avg = (g[x        +  y       * gs] +
                     g[x + step +  y       * gs] +
                     g[x        + (y+step) * gs] +
                     g[x + step + (y+step) * gs]) * 0.25;
        g[(x+half) + (y+half) * gs] = avg + rand(scale);
      }
    }

    // square: edge midpoints
    for (let y = 0; y <= N; y += half) {
      const xStart = ((y / half) % 2 === 0) ? half : 0;
      for (let x = xStart; x <= N; x += step) {
        let sum = 0, cnt = 0;
        if (x-half >= 0) { sum += g[(x-half) +  y      * gs]; cnt++; }
        if (x+half <= N) { sum += g[(x+half) +  y      * gs]; cnt++; }
        if (y-half >= 0) { sum += g[ x       + (y-half)* gs]; cnt++; }
        if (y+half <= N) { sum += g[ x       + (y+half)* gs]; cnt++; }
        g[x + y * gs] = sum / cnt + rand(scale);
      }
    }

    step = half;
    scale *= 0.5;
  }

  const t = new Float32Array(SIZE * SIZE);
  for (let y = 0; y < SIZE; y++)
    for (let x = 0; x < SIZE; x++)
      t[x + y * SIZE] = Math.floor(g[x + y * gs]);
  return t;
}

// Copy-paste this into hitchscratch_chunck_3d_overfly.html to replace the cellColor function
function cellColor(green, level) {
  let r, g, b;
  if (level > 200) {
    const v = Math.min(0xBB, level - 200);
    r = 0x44+v; g = 0x44+v; b = 0x44+v;
  } else if (level > 50 && level < 70) {
    const boost = 255 + Math.abs(level-60)*4096;
    r = 0x22;
     g = Math.min(255, 0x44 + boost / 0xFF);
      b = Math.min(255, (0xFF + boost) % 0xFF);
  } else if (level > 40 && level < 80) {
    const v = 21-(Math.abs(level-60)-20);
    r = 0xDD; g = (v * 8) & 0xFF; b = 0x66;
  } else if (green === 155) {
    r = g = b = 0xFF;
  } else if (green > 200) {
    r = 0x22; g = 0x66; b = 0x22;
  } else if (green >= 0) {
    r = 0x22; g = (0xFF - green * 5) & 0xFF; b = 0x22;
  } else {
    r = 0xF0; g = 0x66; b = 0x4D;
  }
  return [r, g, b];
}

function getElevation(layer0, layer1, x, y) {
  const green = layer0[y * SIZE + x] - 64;
  const level = layer1[y * SIZE + x] - 20;
  let correction = 0, fluff = 0;
  if (level < 30) {
    correction = (level - 30) * 2;
  } else if (level < 90) {
    correction = Math.min(Math.floor(level-30), Math.floor(90-level));
    if (level > 50 && level < 70) correction *= 1.2;
  } else if (level > 200) {
    correction = 200 - level;
  }
  if (green < 0) {
    correction += (-green) * Math.log(-green);
    if (green > -0x33 && level < 200 && (level < 50 || level > 70)) fluff = -green;
  } else if (green < 200 && level < 200 && (level < 40 || level > 80)) {
    correction -= level / 20;
    fluff = Math.max(0, green - 60);
  }
  let z = 250 + level * 3 - correction * 3;
  if (z < 0) z = 50 * z / (50 + z * z);
  const fs = 5;
  if (x < 1 || y < 1 || x >= SIZE-2 || y >= SIZE-2) {
    z = -4000;
  } else if (x < fs || y < fs || x >= SIZE-fs || y >= SIZE-fs) {
    const fall = Math.max(fs-x, fs-y, x-SIZE+fs+1, y-SIZE+fs+1);
    z -= 10 * Math.exp(fall / 3);
  }
  return [z, fluff];
}

function buildTerrain() {
  const layer0 = generateNoise(140, 20);
  const layer1raw = generateNoise(96, 64);
  const layer1 = layer1raw;

  const CHUNCK_SIZE = SIZE;
  const verts = [];
  const colors = [];
  const indices = [];

  // ===== STEP 1: Create vertices (5 per cell, like chunckMeshes.lua) =====
  for (let y = 0; y < CHUNCK_SIZE; y += 2) {
    for (let x = 0; x < CHUNCK_SIZE; x += 2) {
      const green = layer0[y * SIZE + x] - 64;
      const level = layer1[y * SIZE + x] - 20;
      const [z, fluff] = getElevation(layer0, layer1, x, y);
      const [cr, cg, cb] = cellColor(green, level);
      const col = [cr/255, cg/255, cb/255, 1];
      
      // SW corner
      verts.push(x * PIXEL, y * PIXEL, z * PIXEL / 10);
      colors.push(...col);
      
      // SE corner
      verts.push((x + 2) * PIXEL, y * PIXEL, z * PIXEL / 10);
      colors.push(...col);
      
      // NW corner
      verts.push(x * PIXEL, (y + 2) * PIXEL, z * PIXEL / 10);
      colors.push(...col);
      
      // NE corner
      verts.push((x + 2) * PIXEL, (y + 2) * PIXEL, z * PIXEL / 10);
      colors.push(...col);
      
      // Center (top) - with random offset like Lua: (7+math.random(5))/10
      const ox = ((7 + Math.floor(Math.random() * 5)) / 10) * PIXEL;
      const oy = ((7 + Math.floor(Math.random() * 5)) / 10) * PIXEL;
      verts.push(x * PIXEL + ox, y * PIXEL + oy, (z + fluff) * PIXEL / 10);
      colors.push(...col);
    }
  }

  // ===== STEP 2: Create indices (exact pattern from chunckMeshes.lua) =====
  let i = 0; // First vertex of current cell
  
  for (let y = 0; y < CHUNCK_SIZE; y += 2) {
    for (let x = 0; x < CHUNCK_SIZE; x += 2) {
      // First set: 2 triangles forming the pyramid base
      indices.push(i, i+1, i+3);
      indices.push(i+3, i+2, i);
      
      // Second set: 2 triangles connecting to center
      indices.push(i, i+4, i+3);
      indices.push(i+1, i+2, i+4);
      
      if (x > 0) {
        const b = i - 5; // Previous cell in x direction
        // Connect: b+1, i, i+2  and  i+2, b+3, b+1
        indices.push(b+1, i, i+2);
        indices.push(i+2, b+3, b+1);
      }
      
      if (y > 0) {
        const b = i - 5 * (CHUNCK_SIZE / 2); // Previous cell in y direction
        // Connect: b+3, i+1, i  and  i, b+2, b+3
        indices.push(b+3, i+1, i);
        indices.push(i, b+2, b+3);
      }
      
      i += 5;
    }
  }

  return { verts, colors, indices, layer0, layer1 };
}

// ── WebGL ──
const canvas = document.getElementById('c');
canvas.width = 700; canvas.height = 520;
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

const vsrc = `
attribute vec3 aPos; attribute vec4 aColor;
uniform mat4 uMVP; uniform mat4 uModel;
varying vec4 vColor;
void main(){
  gl_Position = uMVP * vec4(aPos,1.0);
  vColor = aColor;
}`;
const fsrc = `
precision mediump float;
varying vec4 vColor; uniform float uFog;
const float FOG_START = 240.0;
const float FOG_RANGE = 350.0;

void main(){
  float fog = clamp((gl_FragCoord.z/gl_FragCoord.w - FOG_START)/FOG_RANGE, 0.0, 1.0) * uFog;
  gl_FragColor = vec4(mix(vColor.rgb, vec3(0.55,0.78,0.95), fog), vColor.a);
}`;

function mkSh(src,t){const s=gl.createShader(t);gl.shaderSource(s,src);gl.compileShader(s);return s;}
const prog=gl.createProgram();
gl.attachShader(prog,mkSh(vsrc,gl.VERTEX_SHADER));
gl.attachShader(prog,mkSh(fsrc,gl.FRAGMENT_SHADER));
gl.linkProgram(prog); gl.useProgram(prog);

const aPos=gl.getAttribLocation(prog,'aPos');
const aNorm=gl.getAttribLocation(prog,'aNorm');
const aColor=gl.getAttribLocation(prog,'aColor');
const uMVP=gl.getUniformLocation(prog,'uMVP');
const uModel=gl.getUniformLocation(prog,'uModel');
const uFog=gl.getUniformLocation(prog,'uFog');

let posBuf,normBuf,colBuf,idxBuf,idxCnt;
function upload(d){
  [posBuf,colBuf,idxBuf].forEach(b=>b&&gl.deleteBuffer(b));
  function vb(data){const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(data),gl.STATIC_DRAW);return b;}
  posBuf=vb(d.verts); colBuf=vb(d.colors);
  idxBuf=gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,idxBuf);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint16Array(d.indices),gl.STATIC_DRAW);
  idxCnt=d.indices.length;
}

// matrix helpers
const m4=()=>new Float32Array(16);
function ident(m){m.fill(0);m[0]=m[5]=m[10]=m[15]=1;return m;}
function mul(o,a,b){for(let c=0;c<4;c++)for(let r=0;r<4;r++){o[c*4+r]=0;for(let k=0;k<4;k++)o[c*4+r]+=a[k*4+r]*b[c*4+k];}return o;}
function persp(m,fov,asp,n,f){const t=1/Math.tan(fov/2);m.fill(0);m[0]=t/asp;m[5]=t;m[10]=(f+n)/(n-f);m[11]=-1;m[14]=2*f*n/(n-f);return m;}
function rx(m,a){ident(m);const c=Math.cos(a),s=Math.sin(a);m[5]=c;m[6]=s;m[9]=-s;m[10]=c;return m;}
function rz(m,a){ident(m);const c=Math.cos(a),s=Math.sin(a);m[0]=c;m[1]=s;m[4]=-s;m[5]=c;return m;}
function tr(m,x,y,z){ident(m);m[12]=x;m[13]=y;m[14]=z;return m;}

// animal buffers
const anB=gl.createBuffer(),anCB=gl.createBuffer(),anIB=gl.createBuffer();
(function(){
  const h=1,w=1,d=2;
  const v=[-h,-w,-d,h,-w,-d,h,w,-d,-h,w,-d, -h,-w,d,h,-w,d,h,w,d,-h,w,d,
            -h,-w,-d,-h,w,-d,-h,w,d,-h,-w,d, h,-w,-d,h,w,-d,h,w,d,h,-w,d,
            -h,-w,-d,h,-w,-d,h,-w,d,-h,-w,d, -h,w,-d,h,w,-d,h,w,d,-h,w,d];
  const cols=[];
  for(let f=0;f<6;f++){const c=f===0?[0.9,0.45,0.45,1]:f===1?[0.25,0.75,0.95,1]:[0.2,0.2,0.2,1];for(let k=0;k<4;k++)cols.push(...c);}
  const idx=[];for(let f=0;f<6;f++){const b=f*4;idx.push(b,b+1,b+2,b,b+2,b+3);}
  gl.bindBuffer(gl.ARRAY_BUFFER,anB); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(v),gl.STATIC_DRAW);
  gl.bindBuffer(gl.ARRAY_BUFFER,anCB);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(cols),gl.STATIC_DRAW);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,anIB);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint16Array(idx),gl.STATIC_DRAW);
})();

function drawMesh(pb,cb,ib,cnt,mm){
  gl.uniformMatrix4fv(uModel,false,mm);
  gl.bindBuffer(gl.ARRAY_BUFFER,pb);gl.enableVertexAttribArray(aPos);gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ARRAY_BUFFER,cb);gl.enableVertexAttribArray(aColor);gl.vertexAttribPointer(aColor,4,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,ib);
  gl.drawElements(gl.TRIANGLES,cnt,gl.UNSIGNED_SHORT,0);
}

let rotXA=-1.0,rotZA=0.15,camDist=400,t0=0,animalOn=true;
let anX=SIZE/2,anY=SIZE/2,anAngle=0,anStep=0,terrain=null;
const proj=m4(),MrX=m4(),MrZ=m4(),Mtr=m4(),tmp=m4(),mvp=m4(),mdl=m4(),anMdl=m4();

function render(ts){
  requestAnimationFrame(render);
  if(!terrain)return;
  const dt=Math.min((ts-t0)/1000,0.1); t0=ts;
  document.getElementById('info').textContent=`Chunk ${SIZE}×${SIZE} — drag to orbit, scroll to zoom | rotX:${rotXA.toFixed(2)} rotZ:${rotZA.toFixed(2)} dist:${camDist.toFixed(0)}`;
  anStep+=dt;
  if(anStep>3){anStep=0;anX=8+Math.random()*(SIZE-16);anY=8+Math.random()*(SIZE-16);}
  anAngle+=dt*0.8;

  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(0.55,0.78,0.95,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);

  const cx=SIZE*PIXEL/2, cy=SIZE*PIXEL/2;
  persp(proj,0.52,canvas.width/canvas.height,1,2000);
  tr(Mtr,-cx,-cy,0);
  rx(MrX,rotXA); rz(MrZ,rotZA);
  tr(tmp,0,-50,-camDist);
  mul(mvp,tmp,MrX); mul(tmp,mvp,MrZ); mul(mvp,tmp,Mtr);
  mul(tmp,proj,mvp);

  ident(mdl);
  gl.uniformMatrix4fv(uMVP,false,mul(mvp,tmp,mdl));
  gl.uniform1f(uFog,1.0);
  drawMesh(posBuf,colBuf,idxBuf,idxCnt,mdl);

  if(animalOn){
    const ax=Math.floor(Math.max(1,Math.min(SIZE-2,anX)));
    const ay=Math.floor(Math.max(1,Math.min(SIZE-2,anY)));
    const [ez]=getElevation(terrain.layer0,terrain.layer1,ax,ay);
    const screenY=(SIZE-1-ay)*PIXEL;
    const az=-(ez*PIXEL/10 + 2 + Math.abs(Math.sin(anAngle))*3);
    ident(anMdl);
    const c=Math.cos(anAngle*0.4),s=Math.sin(anAngle*0.4);
    anMdl[0]=c;anMdl[1]=s;anMdl[4]=-s;anMdl[5]=c;
    anMdl[10]=1;anMdl[15]=1;
    anMdl[12]=ax*PIXEL;anMdl[13]=screenY;anMdl[14]=az;
    gl.uniformMatrix4fv(uMVP,false,mul(mvp,tmp,anMdl));
    gl.uniform1f(uFog,0.5);
    drawMesh(anB,anCB,anIB,36,anMdl);
  }
}

let drag=false,lastX=0,lastY=0;
canvas.addEventListener('mousedown',e=>{drag=true;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  rotZA+=(e.clientX-lastX)*0.005; rotXA+=(e.clientY-lastY)*0.005;
  rotXA=Math.max(-1.0,Math.min(0,rotXA));
  lastX=e.clientX;lastY=e.clientY;
});
canvas.addEventListener('wheel',e=>{camDist=Math.max(200,Math.min(600,camDist+e.deltaY*0.3));e.preventDefault();},{passive:false});
let pDist=0;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pDist=Math.sqrt(dx*dx+dy*dy);}
  else{drag=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',()=>drag=false);
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,d=Math.sqrt(dx*dx+dy*dy);camDist=Math.max(200,Math.min(600,camDist-(d-pDist)*0.5));pDist=d;}
  else if(drag){rotZA+=(e.touches[0].clientX-lastX)*0.005;rotXA+=(e.touches[0].clientY-lastY)*0.005;rotXA=Math.max(-1.0,Math.min(0,rotXA));lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;}
  e.preventDefault();
},{passive:false});

function regen(){
  document.getElementById('info').textContent='Generating…';
  setTimeout(()=>{
    terrain=buildTerrain();
    upload(terrain);
    anX=SIZE/2;anY=SIZE/2;
    document.getElementById('info').textContent=`Chunk ${SIZE}×${SIZE} — drag to orbit, scroll to zoom`;
  },10);
}
document.getElementById('regen').addEventListener('click',regen);
document.getElementById('toggleAnimal').addEventListener('click',function(){
  animalOn=!animalOn;this.textContent='Animal: '+(animalOn?'ON':'OFF');
});
regen();
requestAnimationFrame(ts=>{t0=ts;requestAnimationFrame(render);});
</script>
</body>
</html>
